name: Build and Push RAG API

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "VERSION=latest" >> $GITHUB_ENV
          fi

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u nicole52-web --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/nicole52-web/rag-api:latest \
                       -t ghcr.io/nicole52-web/rag-api:${{ env.VERSION }} .

      - name: Push Docker image
        run: |
          docker push ghcr.io/nicole52-web/rag-api:latest
          docker push ghcr.io/nicole52-web/rag-api:${{ env.VERSION }}